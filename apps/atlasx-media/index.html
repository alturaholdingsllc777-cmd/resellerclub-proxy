<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AtlasX Media</title>
  <style>
    * { margin:0;padding:0;box-sizing:border-box; }
    body { font-family:'Segoe UI',sans-serif;background:#050510;color:#e0e0ff;display:flex;align-items:center;justify-content:center;min-height:100vh; }
    .container { text-align:center;padding:2rem; }
    .logo { font-size:3rem;font-weight:900;letter-spacing:-1px; }
    .logo span { color:#4f8cff; }
    .tagline { margin-top:1rem;font-size:1rem;color:#555;letter-spacing:4px;text-transform:uppercase; }
    .sub { margin-top:.5rem;font-size:.85rem;color:#333; }
    .badge { margin-top:2rem;display:inline-block;border:1px solid #1a1a3a;padding:.4rem 1.2rem;border-radius:4px;font-size:.75rem;color:#4f8cff; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">ATLAS<span>.X</span> MEDIA</div>
    <div class="tagline">Digital Infrastructure · AI Automation</div>
    <div class="sub">Internal Technology Layer · Altura Holdings LLC</div>
    <div class="badge">B2B SaaS · Agent Systems · VPS Infrastructure</div>
  </div>
</body>
</html>
