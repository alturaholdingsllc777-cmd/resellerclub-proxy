server {
    listen 80;
    server_name atlasx.media www.atlasx.media;
    root /opt/atlasx-media/apps/atlasx-media;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location /rc-api/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    access_log /var/log/nginx/atlasx-media.access.log;
    error_log /var/log/nginx/atlasx-media.error.log;
}
